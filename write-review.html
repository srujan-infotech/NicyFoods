<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write a Review | NicyFoods</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:    '#FBF1E2',
            jaggery:  '#5C3A25',
            ink:      '#3A2417',
            turmeric: '#E8A33D',
            marigold: '#F2C14E',
            kumkum:   '#A63A2E',
            herbal:   '#5F7A4F',
          },
          fontFamily: {
            display: ['"Rozha One"', 'serif'],
            body: ['Poppins', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --cream:#FBF1E2; --jaggery:#5C3A25; --ink:#3A2417;
      --turmeric:#E8A33D; --marigold:#F2C14E; --kumkum:#A63A2E; --herbal:#5F7A4F;
    }
    *{box-sizing:border-box;}
    body{ font-family:'Poppins', sans-serif; background:var(--cream); color:var(--ink); }
    h1,h2,h3,.font-display{ font-family:'Rozha One', serif; letter-spacing:.01em; }

    .review-page-card{
      background:#fff; border-radius:1.25rem; box-shadow:0 20px 44px -22px rgba(92,58,37,.35);
    }
    .review-star-picker{ display:flex; gap:.5rem; }
    .review-star-picker button{
      background:none; border:none; cursor:pointer; padding:0; width:38px; height:38px;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    }
    .review-star-picker button:hover{ transform:scale(1.15); }
    .review-star-picker svg{ width:100%; height:100%; fill:rgba(92,58,37,.2); transition:fill .15s ease; }
    .review-star-picker button.active svg{ fill:var(--marigold); }
    .review-form-field{
      width:100%; border:1.5px solid rgba(92,58,37,.15); border-radius:.6rem;
      padding:.75rem 1rem; font-family:inherit; font-size:.95rem; color:var(--ink);
      transition:border-color .2s ease; background:var(--cream);
    }
    .review-form-field:focus{ outline:none; border-color:var(--kumkum); }
    .review-submit-btn{
      width:100%; background:linear-gradient(90deg, var(--turmeric), var(--kumkum)); color:#fff;
      font-weight:600; padding:.9rem 1rem; border-radius:.7rem; border:none; cursor:pointer;
      transition: transform .2s ease, opacity .2s ease, box-shadow .2s ease;
    }
    .review-submit-btn:hover{ transform:translateY(-1px); box-shadow:0 12px 24px -10px rgba(166,58,46,.5); }
    .review-submit-btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; box-shadow:none; }
    .review-form-msg{ font-size:.9rem; margin-top:.9rem; min-height:1.3em; }
    .review-form-msg.success{ color:var(--herbal); }
    .review-form-msg.error{ color:var(--kumkum); }

    .review-success-state{ display:none; }
    .review-success-state.show{ display:block; }
    .review-form-state.hide{ display:none; }
  </style>
</head>
<body class="bg-cream">

  <div id="navbar-placeholder"></div>

  <section class="relative py-16 md:py-24 px-6">
    <div class="max-w-xl mx-auto">

      <div class="text-center mb-10">
        <span class="text-kumkum text-xs tracking-[0.3em] uppercase font-semibold">Real Reviews</span>
        <h1 class="font-display text-3xl md:text-4xl text-jaggery mt-2">Share Your Experience</h1>
        <p class="text-slate-500 mt-3">Tell other customers what you thought of our handmade ladoos.</p>
      </div>

      <div class="review-page-card p-7 md:p-9">

        <!-- Form state -->
        <div id="reviewFormState" class="review-form-state">
          <form id="reviewForm" class="space-y-5">
            <div>
              <label for="reviewName" class="block text-xs font-semibold text-jaggery uppercase tracking-wide mb-2">Your Name</label>
              <input id="reviewName" name="name" type="text" class="review-form-field" placeholder="e.g. Priya Deshmukh" required maxlength="100">
            </div>

            <div>
              <label class="block text-xs font-semibold text-jaggery uppercase tracking-wide mb-2">Your Rating</label>
              <div id="reviewStarPicker" class="review-star-picker" role="radiogroup" aria-label="Rating">
                <button type="button" data-value="1" role="radio" aria-checked="false" aria-label="1 star"><svg viewBox="0 0 20 20"><path d="M10 1l2.6 5.9 6.4.6-4.8 4.3 1.4 6.3L10 15l-5.6 3.1 1.4-6.3L1 7.5l6.4-.6z"/></svg></button>
                <button type="button" data-value="2" role="radio" aria-checked="false" aria-label="2 stars"><svg viewBox="0 0 20 20"><path d="M10 1l2.6 5.9 6.4.6-4.8 4.3 1.4 6.3L10 15l-5.6 3.1 1.4-6.3L1 7.5l6.4-.6z"/></svg></button>
                <button type="button" data-value="3" role="radio" aria-checked="false" aria-label="3 stars"><svg viewBox="0 0 20 20"><path d="M10 1l2.6 5.9 6.4.6-4.8 4.3 1.4 6.3L10 15l-5.6 3.1 1.4-6.3L1 7.5l6.4-.6z"/></svg></button>
                <button type="button" data-value="4" role="radio" aria-checked="false" aria-label="4 stars"><svg viewBox="0 0 20 20"><path d="M10 1l2.6 5.9 6.4.6-4.8 4.3 1.4 6.3L10 15l-5.6 3.1 1.4-6.3L1 7.5l6.4-.6z"/></svg></button>
                <button type="button" data-value="5" role="radio" aria-checked="false" aria-label="5 stars"><svg viewBox="0 0 20 20"><path d="M10 1l2.6 5.9 6.4.6-4.8 4.3 1.4 6.3L10 15l-5.6 3.1 1.4-6.3L1 7.5l6.4-.6z"/></svg></button>
              </div>
              <input type="hidden" id="reviewRating" name="rating" value="0" required>
            </div>

            <div>
              <label for="reviewText" class="block text-xs font-semibold text-jaggery uppercase tracking-wide mb-2">Your Review</label>
              <textarea id="reviewText" name="reviewText" rows="5" class="review-form-field resize-none" placeholder="What did you like about our ladoos?" required maxlength="1000"></textarea>
            </div>

            <button id="reviewSubmitBtn" type="submit" class="review-submit-btn">Submit Review</button>
            <p id="reviewFormMsg" class="review-form-msg" role="status"></p>
          </form>
        </div>

        <!-- Success state -->
        <div id="reviewSuccessState" class="review-success-state text-center py-6">
          <div class="w-16 h-16 mx-auto rounded-full bg-herbal/10 flex items-center justify-center mb-5">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-herbal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </div>
          <h2 class="font-display text-2xl text-jaggery mb-2">Thank You!</h2>
          <p class="text-slate-500 mb-7">Your review has been posted and is now live on our website.</p>
          <a href="index.html" class="inline-flex items-center gap-2 bg-gradient-to-r from-turmeric to-kumkum text-white font-semibold px-7 py-3 rounded-xl hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300">
            Back to Home
          </a>
        </div>

      </div>

      <div class="text-center mt-8">
        <a href="index.html" class="text-sm text-kumkum font-semibold hover:underline">&larr; Back to Home</a>
      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/write-review.js"></script>
</body>
</html>
