<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicyFoods · Admin · Welcome Leads</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/admin-styles.css" />
</head>
<body data-page="welcomeLeads">

    <div id="sidebar-container"></div>

    <div id="main">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.8rem; flex-wrap:wrap;" id="topbar-container"></div>

        <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
            <h2 class="font-display text-xl text-jaggery"><i class="fas fa-user-plus text-kumkum"></i> Welcome Popup Leads</h2>
            <div class="input-icon-wrap" style="width:220px;">
                <i class="fas fa-filter"></i>
                <select id="leadStatusFilter">
                    <option value="">All Statuses</option>
                    <option value="new">New</option>
                    <option value="contacted">Contacted</option>
                    <option value="converted">Converted</option>
                    <option value="ignored">Ignored</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-xl p-4 mb-4 border border-jaggery/5 shadow-sm">
            <p class="text-sm text-slate-500 flex items-center gap-2">
                <i class="fas fa-info-circle text-kumkum"></i>
                Leads captured from the homepage "Welcome to NicyFoods" popup (name, email, mobile number + the NICY10 coupon offer).
            </p>
        </div>

        <div class="table-wrap">
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Source</th><th>Status</th><th>Date</th><th style="min-width:150px;">Actions</th></tr></thead>
                <tbody id="leadsTableBody">
                    <tr>
                        <td colspan="7" class="text-center py-4 text-slate-400">
                            <i class="fas fa-spinner fa-spin mr-2"></i> Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ===== LEAD DETAILS MODAL (read-only) ===== -->
    <div id="leadDetailsModal" class="modal-overlay">
        <div class="modal-box" style="max-width:520px;">
            <div class="modal-header">
                <h2><i class="fas fa-id-card"></i> Lead Details</h2>
                <button class="modal-close" onclick="closeModal('leadDetailsModal')"><i class="fas fa-times"></i></button>
            </div>
            <div style="display:flex; flex-direction:column; gap:0.9rem;">
                <div>
                    <div class="form-label" style="margin-bottom:0.15rem;"><i class="fas fa-user"></i> Name</div>
                    <div id="ldName" class="text-sm text-jaggery font-medium">—</div>
                </div>
                <div>
                    <div class="form-label" style="margin-bottom:0.15rem;"><i class="fas fa-envelope"></i> Email</div>
                    <div id="ldEmail" class="text-sm text-jaggery font-medium">—</div>
                </div>
                <div>
                    <div class="form-label" style="margin-bottom:0.15rem;"><i class="fas fa-phone"></i> Phone</div>
                    <div id="ldPhone" class="text-sm text-jaggery font-medium">—</div>
                </div>
                <div class="form-row">
                    <div>
                        <div class="form-label" style="margin-bottom:0.15rem;"><i class="fas fa-map-marker-alt"></i> Source</div>
                        <div id="ldSource" class="text-sm text-jaggery font-medium">—</div>
                    </div>
                    <div>
                        <div class="form-label" style="margin-bottom:0.15rem;"><i class="fas fa-tag"></i> Coupon</div>
                        <div id="ldCoupon" class="text-sm text-jaggery font-medium">—</div>
                    </div>
                </div>
                <div>
                    <div class="form-label" style="margin-bottom:0.15rem;"><i class="far fa-clock"></i> Submitted</div>
                    <div id="ldDate" class="text-sm text-jaggery font-medium">—</div>
                </div>
                <div>
                    <div class="form-label" style="margin-bottom:0.15rem;"><i class="fas fa-flag"></i> Status</div>
                    <div id="ldStatus">—</div>
                </div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1.2rem; border-top:1px solid rgba(92,58,37,0.06); margin-top:1rem;">
                <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeModal('leadDetailsModal')" style="font-weight:500; background:transparent; border:none; cursor:pointer; padding:0.4rem 0.8rem;">Close</button>
            </div>
        </div>
    </div>

    <!-- ===== LEAD STATUS MODAL ===== -->
    <div id="leadStatusModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2><i class="fas fa-sync-alt"></i> Update Lead Status</h2>
                <button class="modal-close" onclick="closeModal('leadStatusModal')"><i class="fas fa-times"></i></button>
            </div>
            <input type="hidden" id="leadStatusId" />
            <div class="form-group">
                <label class="form-label"><i class="fas fa-tag"></i> Status</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-flag"></i>
                    <select id="leadStatusSelect">
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="converted">Converted</option>
                        <option value="ignored">Ignored</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1rem; border-top:1px solid rgba(92,58,37,0.06); margin-top:0.5rem;">
                <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeModal('leadStatusModal')" style="font-weight:500; background:transparent; border:none; cursor:pointer; padding:0.4rem 0.8rem;">Cancel</button>
                <button id="updateLeadStatusBtn" class="btn-primary"><i class="fas fa-check"></i> Update Status</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Success</span></div>

    <script src="js/auth-client.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/welcome-leads.js"></script>
</body>
</html>
