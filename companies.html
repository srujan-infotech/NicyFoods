<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicyFoods · Admin · Companies</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/admin-styles.css" />
</head>
<body data-page="companies">

    <div id="sidebar-container"></div>

    <div id="main">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.8rem; flex-wrap:wrap;" id="topbar-container"></div>

        <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
            <h2 class="font-display text-xl text-jaggery"><i class="fas fa-building text-kumkum"></i> Manage Companies</h2>
            <button class="btn-primary" onclick="openCompanyModal()"><i class="fas fa-plus"></i> Add Company</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th style="width:70px;">Logo</th><th>Name</th><th>Alt Text</th><th>Order</th><th>Status</th><th style="min-width:130px;">Actions</th></tr></thead>
                <tbody id="companiesTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ===== COMPANY MODAL ===== -->
    <div id="companyModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="companyModalTitle"><i class="fas fa-building"></i> Add Company</h2>
                <button class="modal-close" onclick="closeModal('companyModal')"><i class="fas fa-times"></i></button>
            </div>
            <form id="companyForm">
                <input type="hidden" id="companyId" />
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-image"></i> Company Logo</label>
                    <div class="image-upload-box" id="companyImageUploadBox">
                        <img id="cLogoPreview" class="image-preview" alt="Preview" />
                        <div class="image-upload-hint">
                            <i class="fas fa-cloud-upload-alt"></i> <strong>Click to upload</strong> or drag a logo<br>
                            <span style="font-size:0.65rem;">JPG, PNG, WEBP, SVG · Max 5MB</span>
                        </div>
                        <input type="file" id="cLogoFile" accept="image/png, image/jpeg, image/webp, image/gif, image/svg+xml" />
                    </div>
                    <p id="companyImageUploadStatus" class="image-upload-status"></p>
                    <p class="form-hint"><i class="fas fa-info-circle"></i> Required only when adding a new company. Leave empty on edit to keep the existing logo.</p>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-tag"></i> Company Name</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-building"></i>
                            <input id="cName" required placeholder="e.g. Acme Corp" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-sort-numeric-down"></i> Display Order</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-arrow-down-wide-short"></i>
                            <input id="cOrder" type="number" step="1" min="0" value="0" />
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-universal-access"></i> Alt Text</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-eye"></i>
                        <input id="cAltText" required placeholder="e.g. Acme Corp logo" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-toggle-on"></i> Active?</label>
                    <div class="toggle-wrap">
                        <span class="toggle-label" id="companyActiveLabel">Yes, visible on site</span>
                        <div class="toggle-switch active" id="companyActiveToggle" onclick="toggleCompanyActive()">
                            <input type="hidden" id="cIsActive" value="true" />
                            <div class="toggle-knob"></div>
                        </div>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1rem; border-top:1px solid rgba(92,58,37,0.06); margin-top:0.5rem;">
                    <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeModal('companyModal')" style="font-weight:500; background:transparent; border:none; cursor:pointer; padding:0.4rem 0.8rem;">Cancel</button>
                    <button type="submit" id="companySaveBtn" class="btn-primary"><i class="fas fa-save"></i> Save Company</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Success</span></div>

    <script src="js/auth-client.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/companies.js"></script>
</body>
</html>
