<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicyFoods · Admin · Mission & Vision</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/admin-styles.css" />
</head>
<body data-page="missionVision">

    <div id="sidebar-container"></div>

    <div id="main">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.8rem; flex-wrap:wrap;" id="topbar-container"></div>

        <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
            <h2 class="font-display text-xl text-jaggery">
                <i class="fas fa-bullseye text-kumkum"></i> Manage Mission & Vision
            </h2>
            <button class="btn-primary" onclick="saveMissionVision()">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </div>
        <div class="bg-white rounded-xl p-4 mb-4 border border-jaggery/5 shadow-sm">
            <p class="text-sm text-slate-500 flex items-center gap-2">
                <i class="fas fa-info-circle text-kumkum"></i>
                Manage the Mission & Vision content shown on the homepage and about page.
            </p>
        </div>
        <form id="missionVisionForm" class="bg-white rounded-xl p-6 border border-jaggery/5 shadow-sm">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-tag"></i> Tagline</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-quote-left"></i>
                    <input id="mvTaglineInput" placeholder="e.g. What Drives Us" />
                </div>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-eye"></i> Vision</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-flag"></i>
                    <textarea id="mvVisionInput" rows="6" placeholder="Enter your vision statement..."></textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-bullseye"></i> Mission</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-rocket"></i>
                    <textarea id="mvMissionInput" rows="6" placeholder="Enter your mission statement..."></textarea>
                </div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1rem; border-top:1px solid rgba(92,58,37,0.06); margin-top:0.5rem;">
                <button type="button" class="btn-primary" onclick="saveMissionVision()">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
        </form>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Success</span></div>

    <script src="js/auth-client.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/mission-vision.js"></script>
</body>
</html>
