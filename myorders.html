<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders | NicyFoods</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FFFFFF',
                        jaggery: '#5C3A25',
                        ink: '#3A2417',
                        turmeric: '#F5A623',
                        marigold: '#FFC72C',
                        kumkum: '#D7263D',
                        herbal: '#5F7A4F',
                        sand: '#F8F4F0',
                    },
                    fontFamily: {
                        display: ['"Rozha One"', 'serif'],
                        body: ['Poppins', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <style>
        :root {
            --cream: #FFFFFF;
            --jaggery: #5C3A25;
            --ink: #3A2417;
            --turmeric: #F5A623;
            --marigold: #FFC72C;
            --kumkum: #D7263D;
            --herbal: #5F7A4F;
            --sand: #F8F4F0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--sand);
            color: var(--ink);
            margin: 0;
            padding: 0;
        }
        h1, h2, h3, .font-display {
            font-family: 'Rozha One', serif;
            letter-spacing: .01em;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* ========== HERO ========== */
        .hero {
            position: relative;
            overflow: hidden;
            padding: 64px 20px 56px;
            text-align: center;
            background: linear-gradient(135deg, var(--ink) 0%, var(--jaggery) 55%, var(--kumkum) 100%);
        }
        .hero-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,.1) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
        }
        .hero-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            pointer-events: none;
        }
        .hero-icon-badge {
            width: 78px;
            height: 78px;
            border-radius: 9999px;
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--turmeric), var(--kumkum));
            box-shadow: 0 14px 30px -8px rgba(215,38,61,.55), 0 0 0 6px rgba(255,255,255,.08);
            position: relative;
            z-index: 1;
        }
        .hero-icon-badge i { font-size: 1.9rem; color: #fff; }
        .hero-eyebrow {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            color: var(--marigold);
            letter-spacing: .22em;
            text-transform: uppercase;
            font-size: .72rem;
            font-weight: 700;
            margin-bottom: .75rem;
        }
        .hero h1 {
            position: relative;
            z-index: 1;
            font-size: 2.75rem;
            color: #fff;
            margin: 0;
        }
        @media (min-width:640px) { .hero h1 { font-size: 3.25rem; } }
        .hero p.hero-sub {
            position: relative;
            z-index: 1;
            color: rgba(255,255,255,.72);
            font-size: 1rem;
            margin-top: .6rem;
        }

        /* ========== LOOKUP CARD ========== */
        .lookup-card {
            position: relative;
            overflow: hidden;
            background: white;
            border-radius: 1.6rem;
            padding: 2.25rem;
            box-shadow: 0 20px 50px -22px rgba(92, 58, 37, .35);
            border: 1px solid rgba(92, 58, 37, .06);
            margin-top: -48px;
            margin-bottom: 2rem;
            z-index: 5;
        }
        .lookup-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--turmeric), var(--kumkum), var(--herbal));
        }
        .lookup-icon-circle {
            width: 52px;
            height: 52px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto .9rem;
            background: linear-gradient(135deg, var(--marigold), var(--turmeric));
            box-shadow: 0 8px 18px -6px rgba(245,166,35,.5);
        }
        .lookup-icon-circle i { color: #fff; font-size: 1.15rem; }
        .lookup-card .card-title {
            font-family: 'Rozha One', serif;
            font-size: 1.4rem;
            color: var(--jaggery);
            margin-bottom: 0.35rem;
            text-align: center;
        }
        .lookup-card .card-subtitle {
            color: #9a8a7a;
            font-size: 0.88rem;
            text-align: center;
            margin-bottom: 1.6rem;
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--kumkum);
            margin-bottom: .5rem;
        }
        .lookup-input {
            border: 2px solid rgba(92, 58, 37, .12);
            border-radius: 1rem;
            padding: .85rem 1rem .85rem 3rem;
            width: 100%;
            font-size: .95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: var(--sand);
        }
        .lookup-input:focus {
            outline: none;
            border-color: var(--kumkum);
            box-shadow: 0 0 0 4px rgba(215, 38, 61, .1);
            background: white;
        }
        .lookup-input::placeholder { color: #B5A99A; }
        .input-wrapper { position: relative; }
        .input-wrapper .input-icon {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: #B5A99A;
            transition: color 0.3s ease;
        }
        .input-wrapper:focus-within .input-icon { color: var(--kumkum); }

        .or-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.1rem 0;
        }
        .or-divider .line { flex: 1; height: 1px; background: rgba(92, 58, 37, .12); }
        .or-divider span {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            font-size: 0.72rem;
            color: #9a8a7a;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .btn-primary {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--turmeric), var(--kumkum));
            color: white;
            font-weight: 600;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 1rem;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            box-shadow: 0 10px 24px -10px rgba(215, 38, 61, .5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -60%; width: 40%; height: 100%;
            background: linear-gradient(115deg, transparent, rgba(255,255,255,.55), transparent);
            transform: skewX(-20deg);
            transition: left .8s ease;
        }
        .btn-primary:hover::before { left: 130%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 32px -10px rgba(215, 38, 61, .6); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-primary .spinner-icon { display: none; }
        .btn-primary.loading .spinner-icon { display: inline-block; }
        .btn-primary.loading .btn-text-inner { display: none; }

        .btn-outline-danger {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            font-size: .85rem;
            font-weight: 600;
            color: var(--kumkum);
            background: rgba(215, 38, 61, .06);
            border: 1.5px solid rgba(215, 38, 61, .3);
            padding: 0.55rem 1.2rem;
            border-radius: 0.8rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-outline-danger:hover {
            background: var(--kumkum);
            color: #fff;
            border-color: var(--kumkum);
            transform: translateY(-1px);
        }

        /* ========== ORDER CARDS ========== */
        .order-card {
            position: relative;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 8px 26px -16px rgba(92, 58, 37, .25);
            border: 1px solid rgba(92, 58, 37, .06);
            overflow: hidden;
            margin-bottom: 1.5rem;
            transition: all 0.4s cubic-bezier(.16, .84, .44, 1);
        }
        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 46px -18px rgba(92, 58, 37, .3);
        }
        .order-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .5rem;
            padding: 1.2rem 1.8rem;
            background: var(--sand);
            border-bottom: 1px solid rgba(92, 58, 37, .06);
        }
        .order-id {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-family: monospace;
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--jaggery);
        }
        .order-id i { color: var(--turmeric); }
        .order-date {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: 0.75rem;
            color: #9a8a7a;
            margin-top: .25rem;
        }
        .order-card-body { padding: 1.8rem; }

        /* ========== STATUS BADGES ========== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            font-size: .74rem;
            font-weight: 700;
            padding: .5rem 1.1rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: .04em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .status-badge i { font-size: .9rem; }
        .status-pending { background: rgba(245, 166, 35, .15); color: #B87A0E; }
        .status-pending i { animation: pulse 2s ease-in-out infinite; }
        .status-confirmed { background: rgba(95, 122, 79, .12); color: var(--herbal); }
        .status-processing { background: rgba(215, 38, 61, .1); color: var(--kumkum); }
        .status-processing i { animation: spin 2.4s linear infinite; }
        .status-shipped { background: rgba(59, 130, 246, .12); color: #2563eb; }
        .status-shipped i { animation: truckMove 1.6s ease-in-out infinite; }
        @keyframes truckMove { 0%,100% { transform: translateX(0); } 50% { transform: translateX(4px); } }
        .status-delivered { background: rgba(34, 197, 94, .14); color: #16a34a; }
        .status-delivered i { animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
        .status-cancelled { background: rgba(148, 148, 148, .14); color: #6b7280; }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.12); opacity: .7; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== ORDER ITEMS ========== */
        .order-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px dashed rgba(92, 58, 37, .08);
            font-size: .9rem;
        }
        .order-item-row:last-child { border-bottom: none; }
        .order-item-row .item-name { display: flex; align-items: center; gap: 0.65rem; }
        .item-icon-chip {
            width: 30px; height: 30px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(255,199,44,.25), rgba(215,38,61,.18));
            color: var(--kumkum);
            font-size: .85rem;
            flex-shrink: 0;
        }
        .order-item-row .item-price { font-weight: 600; color: var(--jaggery); }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            margin-top: 0.75rem;
            border-top: 2px solid rgba(92, 58, 37, .08);
        }
        .total-row .total-label {
            display: flex; align-items: center; gap: .4rem;
            font-weight: 600; color: var(--jaggery); font-size: 0.95rem;
        }
        .total-row .total-amount { font-family: 'Rozha One', serif; font-size: 1.4rem; color: var(--kumkum); }

        .order-actions { display: flex; gap: 0.8rem; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
        .track-link {
            display: inline-flex; align-items: center; gap: .5rem;
            font-size: .85rem; font-weight: 600; color: var(--kumkum);
            text-decoration: none; padding: 0.55rem 1.2rem; border-radius: 0.8rem;
            background: rgba(215, 38, 61, .06);
            transition: all 0.3s ease;
        }
        .track-link:hover { background: rgba(215, 38, 61, .12); transform: translateX(3px); }

        .cancelled-note {
            display: inline-flex; align-items: center; gap: .5rem;
            font-size: 0.78rem; color: #9a8a7a;
        }

        /* ========== TIMELINE ========== */
        .order-timeline {
            margin-top: 0.9rem;
            padding-top: 0.9rem;
            border-top: 1px dashed rgba(92, 58, 37, .08);
        }
        .order-timeline .timeline-title {
            display: flex; align-items: center; gap: .4rem;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            color: #9a8a7a; letter-spacing: 0.05em; margin-bottom: 0.5rem;
        }
        .timeline-item {
            display: flex; align-items: center; gap: 0.55rem;
            font-size: 0.76rem; color: #9a8a7a; padding: 0.22rem 0;
        }
        .timeline-item .t-icon { color: var(--turmeric); width: 16px; text-align: center; }
        .timeline-item strong { color: var(--jaggery); }

        /* ========== CANCELLED RIBBON ========== */
        .order-card.cancelled { opacity: 0.82; }
        .cancelled-ribbon {
            position: absolute;
            top: 18px;
            right: -38px;
            transform: rotate(35deg);
            background: linear-gradient(135deg, #9ca3af, #6b7280);
            color: #fff;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            padding: 0.35rem 3rem;
            display: flex; align-items: center; gap: 0.35rem;
            box-shadow: 0 4px 10px rgba(0,0,0,.2);
            z-index: 5;
        }

        /* ========== EMPTY/ERROR/LOADING STATES ========== */
        .state-block { text-align: center; padding: 4rem 0; }
        .state-icon-circle {
            width: 84px; height: 84px;
            border-radius: 9999px;
            margin: 0 auto 1.1rem;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(245,166,35,.18), rgba(215,38,61,.14));
            color: var(--kumkum);
            font-size: 2rem;
        }
        .state-block h3 { font-family: 'Rozha One', serif; font-size: 1.5rem; color: var(--jaggery); margin-bottom: 0.5rem; }
        .state-block p { color: #9a8a7a; max-width: 400px; margin: 0 auto 1.5rem; }
        .browse-link {
            display: inline-flex; align-items: center; gap: .5rem;
            background: linear-gradient(135deg, var(--turmeric), var(--kumkum));
            color: white; font-weight: 600; padding: 0.8rem 2.2rem;
            border-radius: 1rem; text-decoration: none;
            box-shadow: 0 10px 24px -10px rgba(215,38,61,.5);
            transition: all 0.3s ease;
        }
        .browse-link:hover { transform: translateY(-2px); box-shadow: 0 16px 32px -10px rgba(215,38,61,.6); }
        .retry-btn {
            display: inline-flex; align-items: center; gap: .5rem;
            background: linear-gradient(135deg, var(--turmeric), var(--kumkum));
            color: white; font-weight: 600; padding: 0.8rem 2.2rem;
            border: none; border-radius: 1rem; font-size: 1rem; cursor: pointer;
            box-shadow: 0 10px 24px -10px rgba(215,38,61,.5);
            transition: all 0.3s ease;
        }
        .retry-btn:hover { transform: translateY(-2px); }
        .state-icon-circle.spin i { animation: spin 1.2s linear infinite; }

        .results-summary {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .results-summary .count-text { display: flex; align-items: center; gap: .5rem; font-size: 0.95rem; color: var(--jaggery); }
        .results-summary .sort-note { display: flex; align-items: center; gap: .4rem; font-size: 0.78rem; color: #9a8a7a; }

        /* ========== CANCEL CONFIRM MODAL ========== */
        #cancelOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(58, 36, 23, 0.55);
            backdrop-filter: blur(3px);
            display: none; align-items: center; justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity .3s ease;
        }
        #cancelOverlay.show { display: flex; }
        #cancelOverlay.in { opacity: 1; }
        #cancelModal {
            width: 100%; max-width: 380px;
            background: #fff;
            border-radius: 1.4rem;
            padding: 2rem 1.75rem;
            text-align: center;
            box-shadow: 0 30px 70px -20px rgba(26,17,12,.5);
            transform: translateY(20px) scale(.96);
            opacity: 0;
            transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
        }
        #cancelOverlay.in #cancelModal { transform: translateY(0) scale(1); opacity: 1; }
        #cancelModal .cm-icon {
            width: 64px; height: 64px; border-radius: 9999px;
            margin: 0 auto 1rem;
            display: flex; align-items: center; justify-content: center;
            background: rgba(215,38,61,.1); color: var(--kumkum); font-size: 1.6rem;
        }
        #cancelModal h4 { font-family: 'Rozha One', serif; font-size: 1.3rem; color: var(--jaggery); margin-bottom: .5rem; }
        #cancelModal p { font-size: 0.88rem; color: #9a8a7a; margin-bottom: 1.4rem; }
        #cancelModal .cm-order-num { font-weight: 700; color: var(--kumkum); }
        .cm-actions { display: flex; gap: 0.75rem; }
        .cm-btn { flex: 1; padding: 0.75rem 1rem; border-radius: 0.8rem; font-weight: 600; font-size: 0.88rem; cursor: pointer; border: none; transition: all .25s ease; }
        .cm-btn-keep { background: var(--sand); color: var(--jaggery); }
        .cm-btn-keep:hover { background: #eee2d6; }
        .cm-btn-confirm { background: linear-gradient(135deg, var(--kumkum), #b81f34); color: #fff; }
        .cm-btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 10px 20px -8px rgba(215,38,61,.5); }
        .cm-btn-confirm:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        #cancelFormMsg { font-size: 0.78rem; color: var(--kumkum); margin-top: 0.75rem; min-height: 1em; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 640px) {
            .hero h1 { font-size: 2.2rem; }
            .lookup-card { padding: 1.5rem; }
            .order-card-header { flex-direction: column; align-items: flex-start; }
            .order-card-body { padding: 1.2rem; }
            .total-row .total-amount { font-size: 1.2rem; }
            .cancelled-ribbon { right: -46px; top: 14px; font-size: 0.6rem; padding: 0.3rem 3rem; }
        }
    </style>
</head>
<body>

    <!-- ============ HERO ============ -->
    <section class="hero">
        <div class="hero-pattern"></div>
        <div class="hero-blob" style="width:220px;height:220px;top:-10%;right:-6%;background:radial-gradient(circle, rgba(255,199,44,.28), transparent 70%);"></div>
        <div class="hero-blob" style="width:200px;height:200px;bottom:-14%;left:-8%;background:radial-gradient(circle, rgba(215,38,61,.28), transparent 70%);"></div>

        <p class="hero-eyebrow">
            <i class="fas fa-box"></i> Track Your Purchases
        </p>
        <div class="hero-icon-badge">
            <i class="fas fa-clipboard-list"></i>
        </div>
        <h1>My Orders</h1>
        <p class="hero-sub">
            <i class="fas fa-magnifying-glass" style="margin-right:6px;"></i>
            Enter your phone number or email to see your order history
        </p>
    </section>

    <!-- ============ LOOKUP + RESULTS ============ -->
    <div class="container">

        <!-- Lookup form -->
        <div class="lookup-card">
            <div class="lookup-icon-circle"><i class="fas fa-magnifying-glass"></i></div>
            <div class="card-title">Find Your Orders</div>
            <div class="card-subtitle">We'll show you all orders linked to your contact details</div>
            <form id="lookupForm">
                <div>
                    <label class="field-label" for="lookupPhone">
                        <i class="fas fa-mobile-screen-button"></i> Phone Number
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="lookupPhone" class="lookup-input" placeholder="Enter 10-digit mobile number" inputmode="numeric" maxlength="10" />
                    </div>
                </div>

                <div class="or-divider">
                    <div class="line"></div>
                    <span><i class="fas fa-star"></i> OR <i class="fas fa-star"></i></span>
                    <div class="line"></div>
                </div>

                <div>
                    <label class="field-label" for="lookupEmail">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-at input-icon"></i>
                        <input type="email" id="lookupEmail" class="lookup-input" placeholder="Enter email used at checkout" />
                    </div>
                </div>

                <button type="submit" id="lookupBtn" class="btn-primary" style="margin-top:1.4rem;">
                    <i class="fas fa-spinner spinner-icon fa-spin"></i>
                    <span class="btn-text-inner"><i class="fas fa-magnifying-glass"></i> Find My Orders</span>
                </button>
                <div id="lookupError" class="error-message" style="color:var(--kumkum);font-size:0.85rem;text-align:center;display:none;margin-top:0.75rem;"></div>
            </form>
        </div>

        <!-- Results -->
        <div id="resultsWrap"></div>

    </div>

    <!-- ============ CANCEL CONFIRM MODAL ============ -->
    <div id="cancelOverlay">
        <div id="cancelModal">
            <div class="cm-icon"><i class="fas fa-triangle-exclamation"></i></div>
            <h4>Cancel this order?</h4>
            <p>Order <span class="cm-order-num" id="cmOrderNum">—</span> will be cancelled. This can't be undone.</p>
            <div class="cm-actions">
                <button type="button" class="cm-btn cm-btn-keep" id="cmKeepBtn">Keep Order</button>
                <button type="button" class="cm-btn cm-btn-confirm" id="cmConfirmBtn">
                    <i class="fas fa-ban"></i> Yes, Cancel
                </button>
            </div>
            <p id="cancelFormMsg"></p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- CONFIG ----------
            const API_BASE = 'http://localhost:5000';
            const ORDERS_API_URL = API_BASE + '/api/orders/customer';
            const CANCEL_API_URL = API_BASE + '/api/orders/customer'; // + /:orderNumber/cancel

            const STATUS_CONFIG = {
                pending:    { label: 'Placed',    icon: 'fa-clock',              class: 'status-pending' },
                confirmed:  { label: 'Confirmed', icon: 'fa-circle-check',       class: 'status-confirmed' },
                processing: { label: 'Preparing', icon: 'fa-kitchen-set',        class: 'status-processing' },
                shipped:    { label: 'Shipped',   icon: 'fa-truck-fast',         class: 'status-shipped' },
                delivered:  { label: 'Delivered', icon: 'fa-box-open',           class: 'status-delivered' },
                cancelled:  { label: 'Cancelled', icon: 'fa-ban',                class: 'status-cancelled' },
            };

            const CANCELLABLE_STATUSES = ['pending', 'confirmed'];

            function getStatusConfig(status) {
                return STATUS_CONFIG[status] || STATUS_CONFIG.pending;
            }

            function money(n) {
                return '₹' + Math.round(n || 0).toLocaleString('en-IN');
            }

            function formatDate(dateStr) {
                if (!dateStr) return 'N/A';
                try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return 'Invalid Date';
                    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
                } catch (e) {
                    return 'Invalid Date';
                }
            }

            // ---------- DOM REFERENCES ----------
            const form = document.getElementById('lookupForm');
            const phoneInput = document.getElementById('lookupPhone');
            const emailInput = document.getElementById('lookupEmail');
            const errorEl = document.getElementById('lookupError');
            const resultsWrap = document.getElementById('resultsWrap');
            const lookupBtn = document.getElementById('lookupBtn');

            const cancelOverlay = document.getElementById('cancelOverlay');
            const cancelModal = document.getElementById('cancelModal');
            const cmOrderNum = document.getElementById('cmOrderNum');
            const cmKeepBtn = document.getElementById('cmKeepBtn');
            const cmConfirmBtn = document.getElementById('cmConfirmBtn');
            const cancelFormMsg = document.getElementById('cancelFormMsg');

            let lastLookup = { phone: '', email: '' };
            let pendingCancelOrderNumber = null;

            phoneInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 10);
            });

            // ---------- CANCEL MODAL CONTROLS ----------
            function openCancelModal(orderNumber) {
                pendingCancelOrderNumber = orderNumber;
                cmOrderNum.textContent = '#' + orderNumber;
                cancelFormMsg.textContent = '';
                cmConfirmBtn.disabled = false;
                cmConfirmBtn.innerHTML = '<i class="fas fa-ban"></i> Yes, Cancel';
                cancelOverlay.classList.add('show');
                requestAnimationFrame(() => cancelOverlay.classList.add('in'));
            }
            function closeCancelModal() {
                cancelOverlay.classList.remove('in');
                setTimeout(() => cancelOverlay.classList.remove('show'), 300);
                pendingCancelOrderNumber = null;
            }
            cmKeepBtn.addEventListener('click', closeCancelModal);
            cancelOverlay.addEventListener('click', (e) => { if (e.target === cancelOverlay) closeCancelModal(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && cancelOverlay.classList.contains('show')) closeCancelModal(); });

            cmConfirmBtn.addEventListener('click', async function() {
                if (!pendingCancelOrderNumber) return;
                cmConfirmBtn.disabled = true;
                cmConfirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cancelling...';
                cancelFormMsg.textContent = '';

                try {
                    const res = await fetch(`${CANCEL_API_URL}/${encodeURIComponent(pendingCancelOrderNumber)}/cancel`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: lastLookup.phone, email: lastLookup.email }),
                    });
                    const json = await res.json();

                    if (!res.ok || !json.success) {
                        throw new Error(json.message || 'Could not cancel this order.');
                    }

                    closeCancelModal();
                    // Re-run the last search so the card updates to "Cancelled"
                    await performLookup(lastLookup.phone, lastLookup.email);
                } catch (err) {
                    cancelFormMsg.textContent = err.message || 'Something went wrong. Please try again.';
                    cmConfirmBtn.disabled = false;
                    cmConfirmBtn.innerHTML = '<i class="fas fa-ban"></i> Yes, Cancel';
                }
            });

            // Delegate clicks on dynamically rendered cancel buttons
            resultsWrap.addEventListener('click', function(e) {
                const btn = e.target.closest('[data-cancel-order]');
                if (!btn) return;
                openCancelModal(btn.getAttribute('data-cancel-order'));
            });

            // ---------- RENDER FUNCTION ----------
            function renderOrders(orders) {
                console.log('Rendering orders:', orders);

                if (!orders || orders.length === 0) {
                    resultsWrap.innerHTML = `
                        <div class="state-block">
                            <div class="state-icon-circle"><i class="fas fa-magnifying-glass"></i></div>
                            <h3>No orders found</h3>
                            <p>We couldn't find any orders with those details. Double-check your phone number or email.</p>
                            <a href="product.html" class="browse-link"><i class="fas fa-bag-shopping"></i> Browse Products</a>
                        </div>
                    `;
                    return;
                }

                let ordersHtml = orders.map(function(order) {
                    const statusConfig = getStatusConfig(order.status);
                    const isCancelled = order.status === 'cancelled';
                    const canCancel = CANCELLABLE_STATUSES.includes(order.status);
                    const orderNumber = order.orderNumber || order._id || 'N/A';
                    const totalAmount = order.totalAmount || order.subtotal || 0;
                    const createdAt = order.createdAt || order.created_at || new Date();

                    let itemsHtml = '';
                    if (order.items && Array.isArray(order.items) && order.items.length > 0) {
                        itemsHtml = order.items.map(function(item) {
                            const price = item.price || 0;
                            const qty = item.qty || 1;
                            const name = item.name || item.productName || 'Item';
                            const weightLabel = item.weightLabel ? ` (${item.weightLabel})` : (item.weight ? ` (${item.weight}g)` : '');

                            return `
                                <div class="order-item-row">
                                    <span class="item-name">
                                        <span class="item-icon-chip"><i class="fas fa-cookie-bite"></i></span>
                                        ${name}${weightLabel} &times; ${qty}
                                    </span>
                                    <span class="item-price">${money(price * qty)}</span>
                                </div>
                            `;
                        }).join('');
                    } else {
                        itemsHtml = `
                            <div class="order-item-row">
                                <span class="item-name"><i class="fas fa-circle-info" style="color:#c9b8a6;"></i> Items not available</span>
                            </div>
                        `;
                    }

                    let statusHistoryHtml = '';
                    if (order.statusHistory && Array.isArray(order.statusHistory) && order.statusHistory.length > 0) {
                        const historyItems = order.statusHistory.map(function(entry) {
                            const entryStatus = getStatusConfig(entry.status);
                            const date = formatDate(entry.changedAt);
                            return `
                                <div class="timeline-item">
                                    <i class="fas ${entryStatus.icon} t-icon"></i>
                                    <strong>${entryStatus.label}</strong>
                                    <span>&bull;</span>
                                    <span>${date}</span>
                                    ${entry.note ? `<span>&mdash; ${entry.note}</span>` : ''}
                                </div>
                            `;
                        }).join('');
                        statusHistoryHtml = `
                            <div class="order-timeline">
                                <div class="timeline-title"><i class="fas fa-timeline"></i> Order Timeline</div>
                                ${historyItems}
                            </div>
                        `;
                    }

                    const cancelledRibbon = isCancelled
                        ? `<div class="cancelled-ribbon"><i class="fas fa-ban"></i> Cancelled</div>`
                        : '';

                    const cancelButtonHtml = canCancel
                        ? `<button type="button" class="btn-outline-danger" data-cancel-order="${orderNumber}">
                               <i class="fas fa-ban"></i> Cancel Order
                           </button>`
                        : '';

                    const cancelledNoteHtml = isCancelled
                        ? `<span class="cancelled-note"><i class="fas fa-circle-info"></i> This order has been cancelled</span>`
                        : '';

                    return `
                        <div class="order-card ${isCancelled ? 'cancelled' : ''}">
                            ${cancelledRibbon}
                            <div class="order-card-header">
                                <div>
                                    <p class="order-id"><i class="fas fa-tag"></i> #${orderNumber}</p>
                                    <p class="order-date"><i class="fas fa-calendar-days"></i> ${formatDate(createdAt)}</p>
                                </div>
                                <span class="status-badge ${statusConfig.class}">
                                    <i class="fas ${statusConfig.icon}"></i> ${statusConfig.label}
                                </span>
                            </div>
                            <div class="order-card-body">
                                ${itemsHtml}
                                <div class="total-row">
                                    <span class="total-label"><i class="fas fa-wallet"></i> Total</span>
                                    <span class="total-amount">${money(totalAmount)}</span>
                                </div>
                                ${statusHistoryHtml}
                                <div class="order-actions">
                                    <a href="order-confirmation.html?order=${encodeURIComponent(orderNumber)}" class="track-link">
                                        <i class="fas fa-location-dot"></i> Track This Order
                                    </a>
                                    ${cancelButtonHtml}
                                    ${cancelledNoteHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                resultsWrap.innerHTML = `
                    <div class="results-summary">
                        <p class="count-text"><i class="fas fa-chart-simple"></i> <strong>${orders.length}</strong> order${orders.length === 1 ? '' : 's'} found</p>
                        <span class="sort-note"><i class="fas fa-arrows-rotate"></i> Showing latest orders first</span>
                    </div>
                    <div>${ordersHtml}</div>
                `;

                console.log('Orders rendered successfully.');
            }

            // ---------- LOOKUP (shared by form submit + post-cancel refresh) ----------
            async function performLookup(phone, email) {
                lookupBtn.disabled = true;
                lookupBtn.classList.add('loading');
                resultsWrap.innerHTML = `
                    <div class="state-block">
                        <div class="state-icon-circle spin"><i class="fas fa-spinner"></i></div>
                        <p>Looking up your orders...</p>
                    </div>
                `;

                try {
                    const params = new URLSearchParams();
                    if (phone) params.set('phone', phone);
                    if (email) params.set('email', email);

                    const url = ORDERS_API_URL + '?' + params.toString();
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`Server error: ${res.status}`);

                    const json = await res.json();
                    let orders = [];
                    if (json.success && json.data) {
                        orders = json.data;
                    } else if (Array.isArray(json)) {
                        orders = json;
                    } else if (json.data && Array.isArray(json.data)) {
                        orders = json.data;
                    } else {
                        for (let key in json) {
                            if (Array.isArray(json[key])) { orders = json[key]; break; }
                        }
                    }

                    renderOrders(orders);
                } catch (err) {
                    console.error('Error:', err);
                    resultsWrap.innerHTML = `
                        <div class="state-block">
                            <div class="state-icon-circle"><i class="fas fa-face-frown"></i></div>
                            <p>${err.message || 'Could not fetch your orders. Please try again.'}</p>
                            <button onclick="location.reload()" class="retry-btn"><i class="fas fa-arrows-rotate"></i> Try Again</button>
                        </div>
                    `;
                } finally {
                    lookupBtn.disabled = false;
                    lookupBtn.classList.remove('loading');
                }
            }

            // ---------- FORM SUBMIT ----------
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                errorEl.style.display = 'none';

                const phone = phoneInput.value.trim();
                const email = emailInput.value.trim();

                if (!phone && !email) {
                    errorEl.textContent = 'Please enter your phone number or email.';
                    errorEl.style.display = 'block';
                    return;
                }
                if (phone && !/^[6-9][0-9]{9}$/.test(phone)) {
                    errorEl.textContent = 'Please enter a valid 10-digit mobile number.';
                    errorEl.style.display = 'block';
                    return;
                }

                lastLookup = { phone, email };
                await performLookup(phone, email);
            });

            console.log('My Orders page loaded.');
            console.log('API URL:', ORDERS_API_URL);
        })();
    </script>

</body>
</html>
