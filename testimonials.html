<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicyFoods · Admin · Testimonials</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/admin-styles.css" />
</head>
<body data-page="testimonials">

    <div id="sidebar-container"></div>

    <div id="main">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.8rem; flex-wrap:wrap;" id="topbar-container"></div>

        <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
            <h2 class="font-display text-xl text-jaggery"><i class="fas fa-star text-kumkum"></i> Manage Testimonials</h2>
            <button class="btn-primary" onclick="openTestimonialModal()"><i class="fas fa-plus"></i> Add Testimonial</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Name</th><th>Rating</th><th>Text</th><th style="min-width:130px;">Actions</th></tr></thead>
                <tbody id="testimonialsTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ===== TESTIMONIAL MODAL ===== -->
    <div id="testimonialModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="testimonialModalTitle"><i class="fas fa-star"></i> Add Testimonial</h2>
                <button class="modal-close" onclick="closeModal('testimonialModal')"><i class="fas fa-times"></i></button>
            </div>
            <form id="testimonialForm">
                <input type="hidden" id="testimonialId" />
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-user"></i> Name</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-user-circle"></i>
                        <input id="tName" required placeholder="Customer name" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-quote-left"></i> Text</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-quote-left" style="top:18px;"></i>
                        <textarea id="tText" rows="3" required placeholder="Review text"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-star"></i> Rating (1-5)</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-star" style="color:#E8A33D;"></i>
                            <input id="tRating" type="number" min="1" max="5" step="1" value="5" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-palette"></i> Avatar Color (hex)</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-fill-drip"></i>
                            <input id="tColor" placeholder="#A63A2E" />
                        </div>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1rem; border-top:1px solid rgba(92,58,37,0.06); margin-top:0.5rem;">
                    <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeModal('testimonialModal')" style="font-weight:500; background:transparent; border:none; cursor:pointer; padding:0.4rem 0.8rem;">Cancel</button>
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Testimonial</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Success</span></div>

    <script src="js/auth-client.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/testimonials.js"></script>
</body>
</html>
