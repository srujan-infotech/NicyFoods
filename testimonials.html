<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicyFoods · Admin · Testimonials</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/admin-styles.css" />

    <style>
        :root {
            --jaggery: #5C3A25;
            --ink: #3A2417;
            --turmeric: #F5A623;
            --marigold: #FFC72C;
            --kumkum: #D7263D;
            --herbal: #5F7A4F;
            --sand: #F8F4F0;
        }

        body[data-page="testimonials"] {
            font-family: 'Poppins', sans-serif;
            background: var(--sand);
        }

        /* ========== PAGE HEADER ========== */
        .testimonials-page-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.6rem;
            padding: 1.4rem 1.7rem;
            border-radius: 1.4rem;
            background: linear-gradient(135deg, var(--ink) 0%, var(--jaggery) 55%, var(--kumkum) 100%);
            box-shadow: 0 18px 40px -18px rgba(92,58,37,.45);
            position: relative;
            overflow: hidden;
        }
        .testimonials-page-head::before {
            content: '';
            position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,.08) 1px, transparent 1px);
            background-size: 22px 22px;
            pointer-events: none;
        }
        .testimonials-page-head h1 {
            font-family: 'Rozha One', serif;
            color: #fff;
            font-size: 1.7rem;
            margin: 0;
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: .6rem;
        }
        .testimonials-page-head h1 i {
            width: 42px; height: 42px;
            border-radius: 9999px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--turmeric), var(--kumkum));
            font-size: 1.1rem;
            box-shadow: 0 8px 18px -6px rgba(215,38,61,.5);
        }
        .testimonials-page-head p {
            color: rgba(255,255,255,.7);
            font-size: .85rem;
            margin: .25rem 0 0 3.3rem;
            position: relative; z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--turmeric), var(--kumkum));
            color: #fff;
            font-weight: 600;
            padding: .75rem 1.3rem;
            border: none;
            border-radius: .85rem;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: .5rem;
            box-shadow: 0 10px 22px -10px rgba(215,38,61,.5);
            transition: all .25s ease;
            font-size: .85rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 28px -10px rgba(215,38,61,.6); }

        /* ========== TABLE ========== */
        .table-wrap {
            background: #fff;
            border-radius: 1.2rem;
            overflow: hidden;
            border: 1px solid rgba(92,58,37,.06);
            box-shadow: 0 12px 32px -18px rgba(92,58,37,.28);
        }
        .table-wrap table { width: 100%; border-collapse: collapse; }
        .table-wrap thead tr { background: linear-gradient(135deg, var(--sand), #f1e6da); }
        .table-wrap th {
            text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
            font-weight: 700; color: var(--jaggery); padding: 1rem 1.1rem; border-bottom: 2px solid rgba(92,58,37,.08);
        }
        .table-wrap td { padding: .9rem 1.1rem; font-size: .85rem; color: var(--ink); border-bottom: 1px solid rgba(92,58,37,.06); vertical-align: middle; }
        .table-wrap tbody tr { transition: background .2s ease; }
        .table-wrap tbody tr:hover { background: rgba(245,166,35,.06); }
        .table-wrap tbody tr:last-child td { border-bottom: none; }

        .testimonial-name-cell { display: flex; align-items: center; gap: .7rem; font-weight: 600; color: var(--jaggery); }
        .testimonial-avatar {
            width: 36px; height: 36px; border-radius: 9999px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: .85rem; flex-shrink: 0;
            box-shadow: 0 4px 10px -3px rgba(92,58,37,.4);
        }

        .rating-stars { display: inline-flex; gap: .15rem; color: var(--marigold); font-size: .85rem; }
        .rating-stars .dim { color: #e5dcd0; }

        .testimonial-text-cell {
            max-width: 320px;
            color: #6b5140;
            font-size: .82rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .actions-cell { display: flex; gap: .5rem; }
        .btn-edit, .btn-danger {
            width: 34px; height: 34px;
            border-radius: .7rem;
            border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: .82rem;
            transition: all .25s ease;
        }
        .btn-edit { background: rgba(95,122,79,.12); color: var(--herbal); }
        .btn-edit:hover { background: var(--herbal); color: #fff; transform: translateY(-2px); }
        .btn-danger { background: rgba(215,38,61,.1); color: var(--kumkum); }
        .btn-danger:hover { background: var(--kumkum); color: #fff; transform: translateY(-2px); }

        .empty-state {
            display: flex; flex-direction: column; align-items: center; gap: .6rem;
            padding: 3rem 1rem; color: #9a8a7a; font-size: .95rem;
        }
        .empty-state i { font-size: 1.6rem; color: var(--turmeric); }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(58,36,23,.55);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center; justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity .3s ease;
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-box {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 1.4rem;
            padding: 1.8rem 2rem;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 70px -20px rgba(26,17,12,.5);
            transform: translateY(16px) scale(.98);
            transition: transform .35s cubic-bezier(.34,1.56,.64,1);
        }
        .modal-overlay.open .modal-box { transform: translateY(0) scale(1); }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding-bottom: 1.1rem;
            margin-bottom: 1.3rem;
            border-bottom: 2px solid rgba(92,58,37,.08);
        }
        .modal-header h2 {
            font-family: 'Rozha One', serif;
            font-size: 1.35rem;
            color: var(--jaggery);
            display: flex; align-items: center; gap: .6rem;
            margin: 0;
        }
        .modal-header h2 i { color: var(--kumkum); }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 9999px;
            border: none;
            background: var(--sand);
            color: var(--jaggery);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all .25s ease;
        }
        .modal-close:hover { background: var(--kumkum); color: #fff; transform: rotate(90deg); }

        /* ========== FORM FIELDS ========== */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: flex; align-items: center; gap: .4rem;
            font-size: .78rem; font-weight: 600; color: var(--jaggery);
            margin-bottom: .4rem;
        }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap > i {
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            font-size: .9rem; color: #B5A99A; pointer-events: none;
        }
        .input-icon-wrap input,
        .input-icon-wrap select,
        .input-icon-wrap textarea {
            width: 100%;
            border: 1.5px solid rgba(92,58,37,.14);
            border-radius: .8rem;
            padding: .7rem .9rem .7rem 2.6rem;
            font-size: .85rem;
            font-family: inherit;
            background: var(--sand);
            color: var(--ink);
            transition: all .25s ease;
        }
        .input-icon-wrap textarea { padding-top: .7rem; }
        .input-icon-wrap input:focus,
        .input-icon-wrap select:focus,
        .input-icon-wrap textarea:focus {
            outline: none;
            border-color: var(--kumkum);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(215,38,61,.1);
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--jaggery); color: #fff;
            padding: .9rem 1.4rem; border-radius: .9rem;
            display: flex; align-items: center; gap: .6rem;
            font-size: .85rem; font-weight: 600;
            box-shadow: 0 16px 36px -12px rgba(0,0,0,.4);
            transform: translateY(120%); opacity: 0;
            transition: all .35s cubic-bezier(.34,1.56,.64,1);
            z-index: 10000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body data-page="testimonials">

    <div id="sidebar-container"></div>

    <div id="main">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.2rem; flex-wrap:wrap;" id="topbar-container"></div>

        <!-- Page header -->
        <div class="testimonials-page-head">
            <div>
                <h1><i class="fas fa-star"></i> Testimonials</h1>
                <p>Manage what your happy customers are saying</p>
            </div>
            <button class="btn-primary" onclick="openTestimonialModal()"><i class="fas fa-plus"></i> Add Testimonial</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead><tr><th>Name</th><th>Rating</th><th>Text</th><th style="min-width:130px;">Actions</th></tr></thead>
                <tbody id="testimonialsTableBody">
                    <tr><td colspan="4"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Loading testimonials...</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ===== TESTIMONIAL MODAL ===== -->
    <div id="testimonialModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="testimonialModalTitle"><i class="fas fa-star"></i> Add Testimonial</h2>
                <button class="modal-close" onclick="closeModal('testimonialModal')"><i class="fas fa-times"></i></button>
            </div>
            <form id="testimonialForm">
                <input type="hidden" id="testimonialId" />
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-user"></i> Name</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-user-circle"></i>
                        <input id="tName" required placeholder="Customer name" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-quote-left"></i> Text</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-quote-left" style="top:18px;"></i>
                        <textarea id="tText" rows="3" required placeholder="Review text"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-star"></i> Rating (1-5)</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-star" style="color:#E8A33D;"></i>
                            <input id="tRating" type="number" min="1" max="5" step="1" value="5" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-palette"></i> Avatar Color (hex)</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-fill-drip"></i>
                            <input id="tColor" placeholder="#A63A2E" />
                        </div>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1rem; border-top:1px solid rgba(92,58,37,0.06); margin-top:0.5rem;">
                    <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeModal('testimonialModal')" style="font-weight:500; background:transparent; border:none; cursor:pointer; padding:0.4rem 0.8rem;">Cancel</button>
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Testimonial</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Success</span></div>

    <script src="js/auth-client.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/testimonials.js"></script>
</body>
</html>
