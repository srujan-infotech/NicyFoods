<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicyFoods · Admin · Products</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/admin-styles.css" />
</head>
<body data-page="products">

    <div id="sidebar-container"></div>

    <div id="main">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.8rem; flex-wrap:wrap;" id="topbar-container"></div>

        <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
            <h2 class="font-display text-xl text-jaggery"><i class="fas fa-box text-kumkum"></i> Manage Products</h2>
            <button class="btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Add Product</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th style="width:60px;">Image</th><th>Name</th><th>Price</th><th>Category</th><th>Stock</th><th style="min-width:130px;">Actions</th></tr></thead>
                <tbody id="productsTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ===== PRODUCT MODAL ===== -->
    <div id="productModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="productModalTitle"><i class="fas fa-box"></i> Add Product</h2>
                <button class="modal-close" onclick="closeModal('productModal')"><i class="fas fa-times"></i></button>
            </div>
            <form id="productForm" enctype="multipart/form-data">
                <input type="hidden" id="productId" />
                <input type="hidden" id="pExistingImages" value="" />

                <div class="form-card" style="margin-bottom:1.5rem; background:linear-gradient(145deg, #FDF8F2, #fff9f0); border:2px solid rgba(166,58,46,0.06);">
                    <div class="form-card-title"><i class="fas fa-camera"></i> Product Photos <span style="font-weight:400; font-size:0.7rem; color:#8a7362;">(max 3)</span></div>
                    <div class="image-upload-box" id="imageUploadBox">
                        <div class="image-upload-hint">
                            <i class="fas fa-cloud-upload-alt"></i> <strong>Click to upload</strong> or drag up to 3 photos<br>
                            <span style="font-size:0.65rem; color:#bfaea0;">JPG, PNG, WEBP · Max 5MB each</span>
                        </div>
                        <input type="file" id="pImageFiles" accept="image/png, image/jpeg, image/webp, image/gif" multiple />
                    </div>
                    <div id="imagePreviewGrid" class="image-preview-grid"></div>
                    <p id="imageUploadStatus" class="image-upload-status"></p>
                    <p class="form-hint"><i class="fas fa-info-circle"></i> The first uploaded image will be used as the primary cover.</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-tag"></i> Product Name</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-pencil-alt"></i>
                            <input id="pName" required placeholder="e.g. Nachni (Ragi) Laddu" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-folder"></i> Category</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-th-list"></i>
                            <select id="pCategory">
                                <!-- ===== UPDATED CATEGORIES ===== -->
                                <!-- 1** Pregnancy Gift Pack -->
                                <option value="pregnancy-gift">Pregnancy Gift Pack</option>
                                
                                <!-- 2** Sugar Free Range -->
                                <option value="sugar-free">Sugar Free Range</option>
                                
                                <!-- 3** Diet Friendly -->
                                <option value="diet-friendly">Diet Friendly</option>
                                
                                <!-- 4** उपवास Fasting Range -->
                                <option value="fasting">उपवास Fasting Range</option>
                                
                                <!-- 5** Guest Gift Pack -->
                                <option value="guest-gift">Guest Gift Pack</option>
                                
                                <!-- 6** Kids Special -->
                                <option value="kids-special">Kids Special</option>
                                
                                <!-- ===== EXISTING CATEGORIES ===== -->
                                <option value="millet">Millet</option>
                                <option value="traditional">Traditional</option>
                                <option value="herbal">Herbal</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-align-left"></i> Short Description</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-quote-right" style="top:18px;"></i>
                        <textarea id="pDesc" rows="2" placeholder="One or two lines about this product"></textarea>
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-section-title"><i class="fas fa-weight-hanging"></i> Weight Options</div>
                    <div id="weightOptionsList"></div>
                    <button type="button" class="btn-secondary" onclick="addWeightRow()" style="margin-top:0.3rem; font-size:0.7rem; padding:0.25rem 0.8rem;">
                        <i class="fas fa-plus"></i> Add weight option
                    </button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-list-ul"></i> Features</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-check-circle" style="top:18px; color:#5F7A4F;"></i>
                            <textarea id="pFeatures" rows="3" placeholder="No preservatives&#10;100% handmade&#10;Rich in iron"></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-heart"></i> Benefits</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-star" style="top:18px; color:#E8A33D;"></i>
                            <textarea id="pBenefits" rows="3" placeholder="Rich in calcium&#10;Good for digestion"></textarea>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-mortar-pestle"></i> Ingredients</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-seedling" style="top:18px; color:#5F7A4F;"></i>
                        <textarea id="pIngredients" rows="2" placeholder="Nachni flour&#10;Jaggery&#10;Pure ghee"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-rupee-sign"></i> Price (₹)</label>
                        <div class="input-icon-wrap">
                            <i class="fas fa-coins"></i>
                            <input id="pPrice" type="number" step="0.01" min="0" required placeholder="e.g. 329" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-check-circle"></i> In Stock?</label>
                        <div class="toggle-wrap" style="padding-top:0.2rem;">
                            <span class="toggle-label" id="stockLabel">Yes, available</span>
                            <div class="toggle-switch active" id="stockToggle" onclick="toggleStock()">
                                <input type="hidden" id="pInStock" value="true" />
                                <div class="toggle-knob"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1.2rem; border-top:2px solid rgba(166,58,46,0.06); margin-top:0.5rem;">
                    <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeModal('productModal')" style="font-weight:500; background:transparent; border:none; cursor:pointer; padding:0.4rem 0.8rem; transition:color 0.2s;">Cancel</button>
                    <button type="submit" id="productSaveBtn" class="btn-primary"><i class="fas fa-save"></i> Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Success</span></div>

    <script src="js/auth-client.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
