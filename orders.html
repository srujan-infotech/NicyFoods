<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NicyFoods · Admin · Orders</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <link rel="stylesheet" href="css/admin-styles.css" />
</head>
<body data-page="orders">

    <div id="sidebar-container"></div>

    <div id="main">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.8rem; flex-wrap:wrap;" id="topbar-container"></div>

        <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
            <h2 class="font-display text-xl text-jaggery"><i class="fas fa-shopping-cart text-kumkum"></i> Manage Orders</h2>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th style="min-width:110px;">Actions</th></tr></thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ===== ORDER STATUS MODAL ===== -->
    <div id="orderStatusModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2><i class="fas fa-sync-alt"></i> Update Order Status</h2>
                <button class="modal-close" onclick="closeModal('orderStatusModal')"><i class="fas fa-times"></i></button>
            </div>
            <input type="hidden" id="orderStatusId" />
            <div class="form-group">
                <label class="form-label"><i class="fas fa-tag"></i> Status</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-flag"></i>
                    <select id="orderStatusSelect">
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:0.8rem; padding-top:1rem; border-top:1px solid rgba(92,58,37,0.06); margin-top:0.5rem;">
                <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeModal('orderStatusModal')" style="font-weight:500; background:transparent; border:none; cursor:pointer; padding:0.4rem 0.8rem;">Cancel</button>
                <button id="updateOrderStatusBtn" class="btn-primary"><i class="fas fa-check"></i> Update Status</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Success</span></div>

    <script src="js/auth-client.js"></script>
    <script src="js/admin-common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
